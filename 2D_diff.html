<!DOCTYPE html>
<html>
  <head>
    <title>2D diffusion</title>
    <link rel="icon" type="image/x-icon" href="Content/Logos/Logo_website.png">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>


    <style>
      /* Navbar container */
      .navbar {
        overflow: hidden;
        background-color: #333;
        font-family: sans-serif;
      }

      /* Links inside the navbar */
      .navbar a {
        float: left;
        font-size: 16px;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }

      /* The dropdown container */
      .dropdown {
        float: left;
        overflow: hidden;
      }

      /* Dropdown button */
      .dropdown .dropbtn {
        font-size: 16px;
        border: none;
        outline: none;
        color: white;
        padding: 14px 16px;
        background-color: inherit;
        font-family: inherit; /* Important for vertical align on mobile phones */
        margin: 0; /* Important for vertical align on mobile phones */
      }

      /* Add a red background color to navbar links on hover */
      .navbar a:hover, .dropdown:hover .dropbtn {
        background-color: rgb(216, 2, 2);
      }

      /* Dropdown content (hidden by default) */
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }

      /* Links inside the dropdown */
      .dropdown-content a {
        float: none;
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }

      /* Add a grey background color to dropdown links on hover */
      .dropdown-content a:hover {
        background-color: #ddd;
      }

      /* Show the dropdown menu on hover */
      .dropdown:hover .dropdown-content {
        display: block;
      }


      #canvasDiv {
        text-align: center;
      }

      #myCanvas {
        width: 80vw;
        height: 80vh;
        border: 2px black solid;
        background-color: white;
      }
    </style>
  </head>

  <body>

          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="Gray_Scott.html">Gray-Scott model</a>
          <a href="2D_diff.html">2D diffusion</a>
          <a href="Reactor_model.html">Interactive reactor model</a>
          <a href="Reactor_model_2D.html">2D interactive reactor model</a>
        </div>
      </div>
      <a href="About.html">About</a>
      <a href="Contact.html">Contact</a>
    </div>

    <div id="canvasDiv">
      <canvas id="myCanvas"></canvas>
    </div>

    <script src="Javascript/2D_diff.js"></script>
  </body>
</html>
