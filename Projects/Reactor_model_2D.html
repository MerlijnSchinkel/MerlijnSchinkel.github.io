<!DOCTYPE html>
<html>
  <head>
    <title>Interactive reactor model 2D</title>
    <link rel="icon" type="image/x-icon" href="../Content/Logos/Logo_website.png">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>


    <style>
      /* Navbar container */
      .navbar {
        overflow: hidden;
        background-color: #333;
        font-family: Arial;
      }

      /* Links inside the navbar */
      .navbar a {
        float: left;
        font-size: 16px;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }

      /* The dropdown container */
      .dropdown {
        float: left;
        overflow: hidden;
      }

      /* Dropdown button */
      .dropdown .dropbtn {
        font-size: 16px;
        border: none;
        outline: none;
        color: white;
        padding: 14px 16px;
        background-color: inherit;
        font-family: inherit; /* Important for vertical align on mobile phones */
        margin: 0; /* Important for vertical align on mobile phones */
      }

      /* Add a red background color to navbar links on hover */
      .navbar a:hover, .dropdown:hover .dropbtn {
        background-color: rgb(216, 2, 2);
      }

      /* Dropdown content (hidden by default) */
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }

      /* Links inside the dropdown */
      .dropdown-content a {
        float: none;
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }

      /* Add a grey background color to dropdown links on hover */
      .dropdown-content a:hover {
        background-color: #ddd;
      }

      /* Show the dropdown menu on hover */
      .dropdown:hover .dropdown-content {
        display: block;
      }


      #canvasDiv {
        text-align: center;
        display: grid;
        grid-template-columns: 20vw 76vw;
        gap: 10px;
        margin-top: 20px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
        width: 100%;
      }

      /* Removes default focus */
      input[type="range"]:focus {
        outline: none;
      }

      /******** Chrome, Safari, Opera and Edge Chromium styles ********/
      /* slider track */
      input[type="range"]::-webkit-slider-runnable-track {
        background-color: #add8e6;
        border-radius: 0.5rem;
        height: 1rem;
      }

      /* slider thumb */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; /* Override default look */
        appearance: none;
        margin-top: -4px; /* Centers thumb on the track */
        background-color: #808080;
        border-radius: 0.2rem;
        height: 1.5rem;
        width: 0.5rem;
      }

      input[type="range"]:focus::-webkit-slider-thumb {
        outline: 3px solid #808080;
        outline-offset: 0.125rem;
      }

      #myCanvas {
        position: absolute;
        top: 10vh;
        left: 5vw;
        width: 90vw;
        height: 40vh;
        border: 2px black solid;
        background-color: white;
      }

      body {
        margin: 0;
      }

      h1 {
        text-align: center;
        font-family: sans-serif;
        font-size: 250%;
        font-weight: lighter;
        color: black;
      }

      p {
        text-align: center;
        font-family: sans-serif;
        font-size: 100%;
        font-weight: lighter;
        color: black;
      }

      span {
        font-family: sans-serif;
      }

      #sliderGrid {
        display: grid;
        grid-template-columns: 26% 1fr 10%;
        gap: 10px;
        column-gap: 10px;
        width: 40vw;
        position: absolute;
        left: 10vw;
        top: 70vh;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <a href="../Homepage.html">Home</a>
      <div class="dropdown">
        <button class="dropbtn">Projects
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="Gray_Scott.html">Gray-Scott model</a>
          <a href="2D_diff.html">2D diffusion</a>
          <a href="Reactor_model.html">Interactive reactor model</a>
          <a href="Reactor_model_2D.html">2D interactive reactor model</a>
        </div>
      </div>
      <a href="../About.html">About</a>
      <a href="../Contact.html">Contact</a>
    </div>

    <canvas id="myCanvas"></canvas>

    <div id="sliderGrid">
        <span>Flow velocity [m/s]:</span>
        <input id="velInput" type="range" min="1" max="120" value="50">
        <span id="velVal">0.5</span>

        <span>Diffusivity [m2/s]:</span>
        <input id="diffInput" type="range" min="0" max="6" value="3">
        <span id="diffVal">1e-6</span>

        <span>Reaction rate:</span>
        <input id="krInput" type="range" min="0" max="200" value="50">
        <span id="krVal">0.5</span>
    </div>
    
    <script src="../Javascript/Reactor_model_2D.js"></script>
  </body>
</html>
