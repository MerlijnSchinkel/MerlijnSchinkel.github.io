<!DOCTYPE html>
<html>
  <head>
    <title>Homepage</title>
    <link rel="icon" type="image/x-icon" href="Content/Logos/Logo_website.png">
    
    <style>
      /* Navbar container */
      .navbar {
        overflow: hidden;
        background-color: #333;
        font-family: sans-serif;
      }

      /* Links inside the navbar */
      .navbar a {
        float: left;
        font-size: 16px;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }

      /* The dropdown container */
      .dropdown {
        float: left;
        overflow: hidden;
      }

      /* Dropdown button */
      .dropdown .dropbtn {
        font-size: 16px;
        border: none;
        outline: none;
        color: white;
        padding: 14px 16px;
        background-color: inherit;
        font-family: inherit; /* Important for vertical align on mobile phones */
        margin: 0; /* Important for vertical align on mobile phones */
      }

      /* Add a red background color to navbar links on hover */
      .navbar a:hover, .dropdown:hover .dropbtn {
        background-color: rgb(216, 2, 2);
      }

      /* Dropdown content (hidden by default) */
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }

      /* Links inside the dropdown */
      .dropdown-content a {
        float: none;
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }

      /* Add a grey background color to dropdown links on hover */
      .dropdown-content a:hover {
        background-color: #ddd;
      }

      /* Show the dropdown menu on hover */
      .dropdown:hover .dropdown-content {
        display: block;
      }


      h1 {
        text-align: center;
        font-family: sans-serif;
        font-size: 300%;
        font-weight: lighter;
        color: black;
      }

      p {
        text-align: center;
        font-family: sans-serif;
        font-size: 100%;
      }

      body {
        overflow: hidden;
        margin: 0;
      }

      #myCanvas {
        position: absolute;
        z-index: -1;
        left: 0vw;
        top: 0vh;
        width: 100%;
        height: 100%;
        border: 2px black solid;
        align-items: center;
        background-color: white;
      }

      #titleDiv {
        display: inline-block;
        background-color: rgba(116, 170, 85, 0.7);
        width: 50vw;
        height: 100vh;
        position: absolute;
        left: 25vw;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <a href="Homepage.html">Home</a>
      <div class="dropdown">
        <button class="dropbtn">Projects
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="Gray_Scott.html">Gray-Scott model</a>
          <a href="2D_diff.html">2D diffusion</a>
          <a href="Reactor_model.html">Interactive reactor model</a>
          <a href="Reactor_model_2D.html">2D interactive reactor model</a>
        </div>
      </div>
      <a href="About.html">About</a>
      <a href="Contact.html">Contact</a>
    </div>

    <div id="titleDiv">
      <h1>Welcome to my website</h1>

      <p>Here I will share my interactive modelling projects.</p>
    </div>

    <div style="text-align: center;">
      <canvas id="myCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.js"></script>
    <script src="Javascript/functions.js"></script>
    <script src="Javascript/script.js"></script>
  </body>
</html>
